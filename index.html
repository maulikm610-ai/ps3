<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Pyari Streak ❤️</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff2d55; --bg: #0f0208; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; -webkit-tap-highlight-color: transparent; }

        .card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 30px; text-align: center; width: 85%; max-width: 320px; border: 1px solid rgba(255, 45, 85, 0.3); display: none; }
        .card.active { display: block; }

        h1 { font-family: 'Dancing Script', cursive; font-size: 2.8rem; color: var(--pink); margin: 0; }
        .streak-circle { width: 160px; height: 160px; border: 3px solid var(--pink); border-radius: 50%; margin: 15px auto; display: flex; flex-direction: column; justify-content: center; }
        .streak-num { font-size: 5rem; font-weight: 800; line-height: 1; }
        
        input, select { width: 90%; padding: 12px; margin: 8px 0; background: #000; color: white; border: 1px solid #444; border-radius: 10px; text-align: center; }
        
        .btn { background: var(--pink); color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:active { background: #b01e3a; transform: scale(0.98); } /* Visual Feedback */
        
        .btn-outline { background: transparent; border: 1px solid var(--pink); color: var(--pink); margin-top: 15px; }
        
        .alert-box { background: rgba(255, 45, 85, 0.2); border: 1px solid var(--pink); padding: 10px; border-radius: 15px; margin-bottom: 15px; font-size: 0.8rem; }
        .footer-link { color: #ff85a1; font-size: 0.75rem; text-decoration: underline; cursor: pointer; display: block; margin-top: 15px; }
    </style>
</head>
<body>

    <!-- Login -->
    <div id="login-sec" class="card">
        <h1>Welcome</h1>
        <select id="userSel"><option value="Maulik">Maulik</option><option value="Mansi">Mansi</option></select>
        <input type="password" id="passInput" placeholder="Password">
        <button class="btn" id="loginBtn" onclick="handleLogin()">Login ❤️</button>
    </div>

    <!-- Dashboard -->
    <div id="dash-sec" class="card">
        <h1>Pyari Streak</h1>
        <div id="statusAlert" class="alert-box" style="display:none;"></div>
        <div class="streak-circle"><div class="streak-num" id="daysDisp">--</div><div>💗</div></div>
        <div style="font-size: 0.9rem; margin-bottom:10px;">Best: <span id="bestDisp" style="color:var(--pink)">--</span></div>
        
        <button class="btn btn-outline" id="breakBtn" onclick="confirmBreak()">Break Streak 💔</button>
        
        <div id="reset-ui" style="margin-top: 15px; border-top: 1px solid #333; padding-top: 10px;">
            <span class="footer-link" id="toggleLink" onclick="showReset()">⚙️ Settings & Password Reset</span>
            <div id="reset-fields" style="display:none;">
                <input type="password" id="oldP" placeholder="Old Password">
                <input type="password" id="newP" placeholder="New Password">
                <button class="btn" id="resetBtn" style="background:#4a0026;" onclick="handleReset()">Update Password Now</button>
                <span class="footer-link" style="color:#777" onclick="hideReset()">Cancel</span>
            </div>
        </div>
        <span class="footer-link" style="color:#555" onclick="logout()">Logout</span>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbz5JLBRfQ6xO_vyytmar0soMzu-9Ib_G-dfeOnHZv1PSQ8cpRNKtpvAwK2IxaB6_hs/exec";
        let loggedUser = localStorage.getItem('pyariUser');

        function showReset() { document.getElementById('reset-fields').style.display='block'; document.getElementById('toggleLink').style.display='none'; }
        function hideReset() { document.getElementById('reset-fields').style.display='none'; document.getElementById('toggleLink').style.display='block'; }

        async function handleLogin() {
            const btn = document.getElementById('loginBtn');
            btn.innerText = "Checking...";
            const user = document.getElementById('userSel').value;
            const pass = document.getElementById('passInput').value;
            try {
                const res = await fetch(API, {method:'POST', body:JSON.stringify({action:'login', user, pass})});
                const text = await res.text();
                if(text === "Success") {
                    localStorage.setItem('pyariUser', user);
                    location.reload();
                } else { alert("Wrong Password!"); btn.innerText = "Login ❤️"; }
            } catch(e) { alert("Network Error"); btn.innerText = "Login ❤️"; }
        }

        async function init() {
            if(!loggedUser) { document.getElementById('login-sec').classList.add('active'); return; }
            document.getElementById('dash-sec').classList.add('active');
            
            const res = await fetch(API);
            const d = await res.json();
            const diff = Math.floor((new Date() - new Date(d.startDate)) / 86400000);
            document.getElementById('daysDisp').innerText = diff;
            document.getElementById('bestDisp').innerText = d.bestStreak;

            const partnerReq = (loggedUser === "Maulik") ? d.mansiReq : d.maulikReq;
            if(partnerReq === true || partnerReq === "true") {
                const box = document.getElementById('statusAlert');
                box.style.display = 'block';
                box.innerHTML = `Partner wants to break!<br>
                    <button class="btn" style="padding:5px; margin-top:5px" onclick="requestBreak(this)">Approve ✅</button>
                    <button class="btn" style="background:#444; padding:5px; margin-top:5px" onclick="rejectReq(this)">Reject ❌</button>`;
            }
        }

        async function handleReset() {
            const btn = document.getElementById('resetBtn');
            const oldP = document.getElementById('oldP').value;
            const newP = document.getElementById('newP').value;
            if(!oldP || !newP) return alert("Empty fields!");
            
            btn.innerText = "Updating...";
            const res = await fetch(API, {method:'POST', body:JSON.stringify({action:'update_pass', user:loggedUser, oldP, newP})});
            if(await res.text() === "Ok") {
                alert("Success! Password Changed.");
                location.reload();
            } else {
                alert("Incorrect Old Password!");
                btn.innerText = "Update Password Now";
            }
        }

        function confirmBreak() { if(confirm("Break the streak? 💔")) requestBreak(document.getElementById('breakBtn')); }

        async function requestBreak(btn) {
            btn.innerText = "Sending...";
            const res = await fetch(API, {method:'POST', body:JSON.stringify({action:'break_request', user:loggedUser})});
            if(await res.text() === "ResetDone") location.reload();
            else { alert("Request sent!"); btn.innerText = "Pending Approval..."; }
        }

        async function rejectReq(btn) {
            btn.innerText = "Wait...";
            await fetch(API, {method:'POST', body:JSON.stringify({action:'reject'})});
            location.reload();
        }

        function logout() { localStorage.removeItem('pyariUser'); location.reload(); }
        window.onload = init;
    </script>
</body>
</html>
