<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Pyari Streak ❤️</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --pink: #ff2d55; --bg: #0f0208; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; -webkit-tap-highlight-color: transparent; }

        /* Premium Glossy Look */
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px); 
            padding: 35px 25px; 
            border-radius: 45px; 
            text-align: center; 
            width: 85%; 
            max-width: 330px; 
            border: 1px solid rgba(255, 45, 85, 0.3); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            display: none; 
        }
        .card.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { font-family: 'Dancing Script', cursive; font-size: 3rem; color: var(--pink); margin-bottom: 10px; }
        
        .circle { 
            width: 180px; height: 180px; 
            border: 3px solid var(--pink); 
            border-radius: 50%; 
            margin: 20px auto; 
            display: flex; flex-direction: column; justify-content: center; 
            box-shadow: 0 0 20px rgba(255, 45, 85, 0.2);
        }
        .num { font-size: 5.5rem; font-weight: 800; line-height: 1; }
        
        input, select { 
            width: 90%; padding: 13px; margin: 10px 0; 
            background: rgba(0,0,0,0.6); color: white; 
            border: 1px solid #330d1a; border-radius: 15px; 
            text-align: center; font-size: 1rem;
        }
        
        .btn { 
            background: var(--pink); color: white; border: none; 
            padding: 15px; border-radius: 15px; width: 100%; 
            font-weight: bold; cursor: pointer; margin-top: 15px;
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        
        .btn-outline { background: transparent; border: 1px solid var(--pink); color: var(--pink); margin-top: 25px; }
        
        .reset-link { color: #ff85a1; font-size: 0.8rem; text-decoration: underline; cursor: pointer; display: block; margin-top: 20px; }
        .alert-box { background: rgba(255, 45, 85, 0.2); border: 1px solid var(--pink); padding: 12px; border-radius: 20px; margin-bottom: 15px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div id="login-sec" class="card">
        <h1>Welcome</h1>
        <select id="userSel"><option value="Maulik">Maulik</option><option value="Mansi">Mansi</option></select>
        <input type="password" id="passInput" placeholder="Password">
        <button class="btn" id="loginBtn" onclick="handleLogin()">Login ❤️</button>
    </div>

    <!-- Dashboard Section -->
    <div id="dash-sec" class="card">
        <h1>Pyari Streak</h1>
        <div id="statusAlert" class="alert-box" style="display:none;"></div>
        <div class="circle">
            <div class="num" id="daysDisp">--</div>
            <div style="font-size: 1.5rem;">💗</div>
        </div>
        <div style="font-size: 0.9rem; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 20px;">
            Best Record: <span id="bestDisp" style="color:var(--pink); font-weight:800;">--</span> 💝
        </div>

        <button class="btn btn-outline" id="breakBtn" onclick="confirmBreak()">Break Streak 💔</button>
        
        <div id="reset-ui">
            <span class="reset-link" id="toggleReset" onclick="showReset()">⚙️ Settings & Password Reset</span>
            <div id="reset-fields" style="display:none; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
                <input type="password" id="oldP" placeholder="Current Password">
                <input type="password" id="newP" placeholder="New Password">
                <button class="btn" id="resetBtn" style="background:#4a0026;" onclick="handleReset()">Update Password</button>
                <span class="reset-link" style="text-decoration:none; color:#777" onclick="hideReset()">Cancel</span>
            </div>
        </div>

        <p onclick="logout()" style="font-size:0.7rem; color:#555; margin-top:25px; cursor:pointer;">Logout / Switch User</p>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbz5JLBRfQ6xO_vyytmar0soMzu-9Ib_G-dfeOnHZv1PSQ8cpRNKtpvAwK2IxaB6_hs/exec";
        let loggedUser = localStorage.getItem('pyariUser');

        function showReset() { document.getElementById('reset-fields').style.display='block'; document.getElementById('toggleReset').style.display='none'; }
        function hideReset() { document.getElementById('reset-fields').style.display='none'; document.getElementById('toggleReset').style.display='block'; }

        async function handleLogin() {
            const btn = document.getElementById('loginBtn');
            const user = document.getElementById('userSel').value;
            const pass = document.getElementById('passInput').value;
            btn.innerText = "Connecting...";
            try {
                const res = await fetch(API, {method:'POST', body:JSON.stringify({action:'login', user, pass})});
                if(await res.text() === "Success") {
                    localStorage.setItem('pyariUser', user);
                    location.reload();
                } else { alert("Galat Password!"); btn.innerText = "Login ❤️"; }
            } catch(e) { alert("Network Error!"); btn.innerText = "Login ❤️"; }
        }

        async function init() {
            if(!loggedUser) { document.getElementById('login-sec').classList.add('active'); return; }
            document.getElementById('dash-sec').classList.add('active');
            
            const res = await fetch(API + "?nocache=" + new Date().getTime());
            const d = await res.json();
            const diff = Math.floor((new Date() - new Date(d.startDate)) / 86400000);
            document.getElementById('daysDisp').innerText = diff;
            document.getElementById('bestDisp').innerText = d.bestStreak;

            const partnerReq = loggedUser === "Maulik" ? d.mansiReq : d.maulikReq;
            if(partnerReq === true || partnerReq === "true") {
                const partner = loggedUser === "Maulik" ? "Mansi" : "Maulik";
                const box = document.getElementById('statusAlert');
                box.style.display = 'block';
                box.innerHTML = `<p>${partner} wants to break streak!</p>
                    <button class="btn" style="padding:8px; margin-bottom:5px" onclick="requestBreak(this)">Approve ✅</button>
                    <button class="btn" style="background:#444; padding:8px" onclick="rejectReq(this)">Reject ❌</button>`;
            }

            if (localStorage.getItem('lastGreet') !== new Date().toDateString()) {
                setTimeout(() => confetti({ particleCount: 100, spread: 70, colors: ['#ff2d55', '#ffffff'] }), 500);
                localStorage.setItem('lastGreet', new Date().toDateString());
            }
        }

        async function handleReset() {
            const btn = document.getElementById('resetBtn');
            const oldP = document.getElementById('oldP').value;
            const newP = document.getElementById('newP').value;
            if(!oldP || !newP) return alert("Empty fields!");
            
            btn.innerText = "Updating...";
            const res = await fetch(API, {method:'POST', body:JSON.stringify({action:'update_pass', user:loggedUser, oldP, newP})});
            if(await res.text() === "Ok") {
                alert("Success! Password changed.");
                location.reload();
            } else {
                alert("Old password galat hai!");
                btn.innerText = "Update Password";
            }
        }

        function confirmBreak() { if(confirm("Are you sure? 💔")) requestBreak(document.getElementById('breakBtn')); }

        async function requestBreak(btn) {
            btn.innerText = "Processing...";
            const res = await fetch(API, {method:'POST', body:JSON.stringify({action:'break_request', user:loggedUser})});
            if(await res.text() === "ResetDone") location.reload();
            else { alert("Request sent!"); btn.innerText = "Waiting..."; }
        }

        async function rejectReq(btn) {
            btn.innerText = "Wait...";
            await fetch(API, {method:'POST', body:JSON.stringify({action:'reject'})});
            location.reload();
        }

        function logout() { localStorage.removeItem('pyariUser'); location.reload(); }
        window.onload = init;
    </script>
</body>
</html>
